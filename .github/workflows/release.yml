name: Build Docker image and agent releases

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  agent:
    name: Build agent (${{ matrix.asset_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: vibe-agent-linux-x86_64
            asset_name: vibe-agent-linux-x86_64.tar.gz
            binary_name: vibe-agent
            archive: tar
          - os: macos-15-intel
            artifact_name: vibe-agent-macos-x86_64
            asset_name: vibe-agent-macos-x86_64.tar.gz
            binary_name: vibe-agent
            archive: tar
          - os: macos-14
            artifact_name: vibe-agent-macos-aarch64
            asset_name: vibe-agent-macos-aarch64.tar.gz
            binary_name: vibe-agent
            archive: tar
          - os: windows-latest
            artifact_name: vibe-agent-windows-x86_64
            asset_name: vibe-agent-windows-x86_64.zip
            binary_name: vibe-agent.exe
            archive: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent

      - name: Build release binary
        run: cargo build --release --manifest-path agent/Cargo.toml

      - name: Package Unix binary
        if: matrix.archive == 'tar'
        shell: bash
        run: |
          mkdir -p dist-agent/${{ matrix.artifact_name }}
          cp agent/target/release/${{ matrix.binary_name }} dist-agent/${{ matrix.artifact_name }}/${{ matrix.binary_name }}
          chmod +x dist-agent/${{ matrix.artifact_name }}/${{ matrix.binary_name }}
          tar -czf dist-agent/${{ matrix.asset_name }} -C dist-agent/${{ matrix.artifact_name }} ${{ matrix.binary_name }}

      - name: Package Windows binary
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist-agent/${{ matrix.artifact_name }}" | Out-Null
          Copy-Item "agent/target/release/${{ matrix.binary_name }}" "dist-agent/${{ matrix.artifact_name }}/${{ matrix.binary_name }}"
          Compress-Archive -Path "dist-agent/${{ matrix.artifact_name }}/${{ matrix.binary_name }}" -DestinationPath "dist-agent/${{ matrix.asset_name }}" -Force

      - name: Upload agent artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist-agent/${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - agent
    runs-on: ubuntu-latest
    steps:
      - name: Download agent artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-agent
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist-agent/*
