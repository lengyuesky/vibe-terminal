name: Build Docker image and agent releases

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  changes:
    name: Detect Docker changes
    runs-on: ubuntu-latest
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docker:
              - 'server/**'
              - 'web/**'
              - 'server/Dockerfile'
              - 'docker-compose.yml'
              - '.github/workflows/release.yml'

  docker:
    name: Build and publish Docker image
    needs:
      - changes
    if: startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prune old SHA image versions
        uses: actions/github-script@v7
        env:
          PACKAGE_NAME: ${{ github.event.repository.name }}
          SHA_IMAGE_VERSIONS_TO_KEEP: "5"
        with:
          script: |
            const owner = context.repo.owner;
            const packageName = process.env.PACKAGE_NAME;
            const keep = Number.parseInt(process.env.SHA_IMAGE_VERSIONS_TO_KEEP, 10);

            if (!Number.isInteger(keep) || keep < 1) {
              throw new Error(`SHA_IMAGE_VERSIONS_TO_KEEP must be a positive integer, got ${process.env.SHA_IMAGE_VERSIONS_TO_KEEP}`);
            }

            const { data: ownerInfo } = await github.request('GET /users/{username}', {
              username: owner,
            });
            const isOrg = ownerInfo.type === 'Organization';

            const baseParams = {
              package_type: 'container',
              package_name: packageName,
              state: 'active',
              per_page: 100,
            };
            const listRoute = isOrg
              ? 'GET /orgs/{org}/packages/{package_type}/{package_name}/versions'
              : 'GET /users/{username}/packages/{package_type}/{package_name}/versions';
            const listParams = isOrg
              ? { org: owner, ...baseParams }
              : { username: owner, ...baseParams };

            const versions = await github.paginate(listRoute, listParams);
            const protectedTag = (tag) => tag === 'latest' || tag === 'main' || tag.startsWith('v');
            const shaOnlyVersions = versions
              .filter((version) => {
                const tags = version.metadata?.container?.tags ?? [];
                const hasShaTag = tags.some((tag) => tag.startsWith('sha-'));
                const hasProtectedTag = tags.some(protectedTag);
                return hasShaTag && !hasProtectedTag;
              })
              .sort((left, right) => new Date(right.created_at) - new Date(left.created_at));

            const versionsToDelete = shaOnlyVersions.slice(keep);
            core.info(`Found ${versions.length} active image versions.`);
            core.info(`Found ${shaOnlyVersions.length} SHA-only image versions; keeping ${Math.min(keep, shaOnlyVersions.length)} and deleting ${versionsToDelete.length}.`);

            if (versionsToDelete.length === 0) {
              return;
            }

            const deleteRoute = isOrg
              ? 'DELETE /orgs/{org}/packages/{package_type}/{package_name}/versions/{package_version_id}'
              : 'DELETE /users/{username}/packages/{package_type}/{package_name}/versions/{package_version_id}';

            for (const version of versionsToDelete) {
              const tags = version.metadata?.container?.tags ?? [];
              core.info(`Deleting image version ${version.id} (${tags.join(', ') || 'untagged'}, created ${version.created_at}).`);
              const deleteParams = isOrg
                ? { org: owner, package_type: 'container', package_name: packageName, package_version_id: version.id }
                : { username: owner, package_type: 'container', package_name: packageName, package_version_id: version.id };
              await github.request(deleteRoute, deleteParams);
            }

  agent:
    name: Build agent (${{ matrix.asset_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: vibe-agent-linux-x86_64
            asset_name: vibe-agent-linux-x86_64.tar.gz
          - os: macos-15-intel
            artifact_name: vibe-agent-macos-x86_64
            asset_name: vibe-agent-macos-x86_64.tar.gz
          - os: macos-14
            artifact_name: vibe-agent-macos-aarch64
            asset_name: vibe-agent-macos-aarch64.tar.gz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent

      - name: Build release binary
        run: cargo build --release --manifest-path agent/Cargo.toml

      - name: Package agent binary
        shell: bash
        run: |
          mkdir -p dist-agent/${{ matrix.artifact_name }}
          cp agent/target/release/vibe-agent dist-agent/${{ matrix.artifact_name }}/vibe-agent
          chmod +x dist-agent/${{ matrix.artifact_name }}/vibe-agent
          tar -czf dist-agent/${{ matrix.asset_name }} -C dist-agent/${{ matrix.artifact_name }} vibe-agent

      - name: Upload agent artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist-agent/${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - agent
    runs-on: ubuntu-latest
    steps:
      - name: Download agent artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-agent
          pattern: vibe-agent-*
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist-agent/*
