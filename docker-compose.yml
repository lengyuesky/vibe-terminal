services:
  server:
    image: ghcr.io/lengyuesky/vibe-terminal:latest
    environment:
      VIBE_CONFIG: "/app/config.yaml"
    volumes:
      - type: bind
        source: ./config.yaml
        target: /app/config.yaml
        read_only: true
        bind:
          create_host_path: false
      - vibe-data:/data
      - vibe-workspace-data:/workspace-data
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  vibe-data:
  vibe-workspace-data:
